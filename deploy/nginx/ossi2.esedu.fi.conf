server {
    listen 80;
    server_name ossi2.esedu.fi;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name ossi2.esedu.fi;

    ssl_certificate /etc/letsencrypt/live/ossi2.esedu.fi/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ossi2.esedu.fi/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 25m;

    location /graphql {
        proxy_pass http://127.0.0.1:3000/graphql;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }

    # Optional prefix route for frontend/API integration.
    # Example: https://ossi2.esedu.fi/api/graphql -> http://127.0.0.1:3000/graphql
    location /api/graphql {
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass http://127.0.0.1:3000/graphql;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }

    location / {
        root /var/www/ossi2/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
